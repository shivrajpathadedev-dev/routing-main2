<div class="container-fluid mt-3">

  <div class="row mb-3">
    <div class="col-12 text-right">
      <button
        mat-raised-button
        color="primary"
        routerLink="addusers">
        Add User
      </button>
    </div>
  </div>

  <div class="row">

    <div class="col-lg-5 mb-3">
      <ul class="list-group">
        <li
          *ngFor="let user of userArr"
          class="list-group-item d-flex justify-content-between align-items-center"
          [routerLink]="['/users', user.userId]"
          routerLinkActive="active">

          <span>{{ user.userName }}</span>

          <span
            class="badge"
            [ngClass]="user.isActive ? 'badge-primary' : 'badge-danger'">
            {{ user.isActive ? 'Active' : 'In-Active' }}
          </span>

        </li>
      </ul>
    </div>

    <div class="col-lg-7">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
