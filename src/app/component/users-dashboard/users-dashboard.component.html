<div class="row">
    <div class="col-12 text-right mt-2">
        <button routerLink="addusers" mat-raised-button color="primary">
            Add Product
        </button>
    </div>
      <div class="col-md-5">
            <ul class="list-group">
                <li
                routerLinkActive="active",
                [routerLink]="['/users',user.userId]"
                 class="list-group-item d-flex justify-content-between align-items-center"
                *ngFor="let user of userArr">
                 <span>{{user.userName}}</span>
                 <small class="badge" [ngClass]="user.isActive? 'badge-primary':'badge-danger'">
                    {{user.isActive?'Active':'In-Active'}}
                 </small>
                </li> 
            </ul>
        </div>
        <div class="col-md-7">
            <router-outlet></router-outlet>
        </div>
</div>
