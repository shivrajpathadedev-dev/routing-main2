<div class="container-fluid dashboard">

  <div class="row mb-3">
    <div class="col-12 text-right">
      <button
        mat-raised-button
        color="primary"
        
        [routerLink]="['/product', 'addproduct']">
        Add Product
      </button>
    </div>
  </div>

  <div class="row h-100">

    <div class="col-md-6 product-list">
      <!-- Product List -->
      <ul class="list-group">
        <li
          *ngFor="let product of productArr"
          [routerLink]="['/product', product.pid]"
          routerLinkActive="active"
          class="list-group-item d-flex justify-content-between align-items-center">

          <div class="d-flex align-items-center">
            <img
              [src]="product.pimg"
              width="60"
              height="60"
              class="rounded me-3">

            <span>{{ product.pname }}</span>
          </div>

          <span class="badge"
            [ngClass]="{
              'badge-primary': product.pstatus === 'In-Progress',
              'badge-success': product.pstatus === 'Dispatched',
              'badge-warning': product.pstatus === 'Delivered'
            }">
            {{ product.pstatus }}
          </span>

        </li>
      </ul>
    </div>

    <div class="col-md-6 product-details">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
